services:
  # ── Local Telegram Bot API Server ──────────────────────────────────────────
  # Runs telegram-bot-api locally so the bot doesn't connect to api.telegram.org.
  # Requires TELEGRAM_API_ID and TELEGRAM_API_HASH from https://my.telegram.org/apps
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID:   "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_LOCAL: "1"
    ports:
      - "8081:8081"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── YT Summarizer Bot ───────────────────────────────────────────────────────
  # Uncomment this section if you want to run the whole stack via docker compose.
  # Otherwise, keep running 'python bot.py' locally and only use the API server.
  #
  # bot:
  #   build: .
  #   container_name: yt-summarizer-bot
  #   restart: unless-stopped
  #   depends_on:
  #     telegram-bot-api:
  #       condition: service_healthy
  #   env_file: .env
  #   environment:
  #     LOCAL_BOT_API_SERVER_URL: "http://telegram-bot-api:8081"

volumes:
  telegram-bot-api-data:
